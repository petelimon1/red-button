<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="78%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#e53935" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="btnFill" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Red button outer glow -->
  <circle cx="930" cy="315" r="240" fill="#e53935" opacity="0.08"/>
  <circle cx="930" cy="315" r="210" fill="#e53935" opacity="0.08"/>

  <!-- Red button -->
  <circle cx="930" cy="315" r="180" fill="url(#btnFill)"/>

  <!-- Button highlight -->
  <ellipse cx="885" cy="258" rx="65" ry="42" fill="white" opacity="0.13"/>

  <!-- Title -->
  <text x="80" y="215" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="104" font-weight="900" fill="#ffffff" letter-spacing="-2">Don't</text>
  <text x="80" y="330" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="104" font-weight="900" fill="#ffffff" letter-spacing="-2">Click It.</text>

  <!-- Accent line -->
  <rect x="80" y="358" width="56" height="5" fill="#e53935" rx="2"/>

  <!-- Subtext -->
  <text x="80" y="415" font-family="Arial,Helvetica,sans-serif" font-size="32" fill="#aaaaaa">How long can you resist?</text>
  <text x="80" y="468" font-family="Arial,Helvetica,sans-serif" font-size="24" fill="#555555">youarenotallowedtoclicktheredbutton.com</text>
</svg>
